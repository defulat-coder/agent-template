name: ZRead Wiki Update

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable && corepack install

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: "true"

      - name: Install pinned ZRead CLI
        run: npm install --global "zread_cli@$(cat scripts/zread/CLI_VERSION)"

      - name: Generate ZRead wiki
        run: pnpm docs:zread:update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL || 'https://api.kimi.com/coding/' }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'kimi-for-coding' }}

      - name: Create wiki pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          add-paths: .zread/wiki
          branch: zread/wiki-update
          commit-message: "docs(ZRead): 更新项目 Wiki"
          title: "docs(ZRead): 更新项目 Wiki"
          body: |
            由受控 ZRead CLI 生成流程创建。

            仅包含 `.zread/wiki/` 当前版本，需要通过项目门禁和人工审阅后合并。
