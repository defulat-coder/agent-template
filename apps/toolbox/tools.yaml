kind: source
name: agent-template-postgres
type: postgres
host: ${TOOLBOX_POSTGRES_HOST}
port: ${TOOLBOX_POSTGRES_PORT}
database: ${TOOLBOX_POSTGRES_DATABASE}
user: ${TOOLBOX_POSTGRES_USER}
password: ${TOOLBOX_POSTGRES_PASSWORD}
---
kind: tool
name: summarize-ecommerce-sales-by-day
type: postgres-sql
source: agent-template-postgres
description: |
  Summarize synthetic ecommerce gross sales, refunds, net sales, orders, and buyers by day.
  Use this read-only tool for bounded sales-trend analysis in an ISO-8601 UTC time window.
statement: |
  WITH settled_orders AS (
    SELECT
      "paidAt"::date AS "salesDate",
      "customerId",
      "paidTotal",
      "refundedTotal"
    FROM "EcommerceOrder"
    WHERE status IN ('PAID', 'FULFILLED', 'REFUNDED')
      AND "paidAt" >= $1::timestamptz
      AND "paidAt" < $2::timestamptz
  )
  SELECT
    "salesDate",
    COUNT(*)::int AS "paidOrderCount",
    COUNT(DISTINCT "customerId")::int AS "buyerCount",
    COALESCE(SUM("paidTotal"), 0) AS "grossSales",
    COALESCE(SUM("refundedTotal"), 0) AS "refundAmount",
    COALESCE(SUM("paidTotal" - "refundedTotal"), 0) AS "netSales"
  FROM settled_orders
  GROUP BY "salesDate"
  ORDER BY "salesDate" ASC;
parameters:
  - name: from
    type: string
    description: Inclusive ISO-8601 UTC sales window start.
  - name: to
    type: string
    description: Exclusive ISO-8601 UTC sales window end.
---
kind: tool
name: summarize-ecommerce-sales-by-channel
type: postgres-sql
source: agent-template-postgres
description: |
  Compare synthetic ecommerce sales performance across web, mini program, marketplace, and live stream channels.
  Use this read-only tool for bounded channel-performance analysis.
statement: |
  SELECT
    channel::text AS channel,
    COUNT(*)::int AS "paidOrderCount",
    COUNT(DISTINCT "customerId")::int AS "buyerCount",
    COALESCE(SUM("paidTotal"), 0) AS "grossSales",
    COALESCE(SUM("refundedTotal"), 0) AS "refundAmount",
    COALESCE(SUM("paidTotal" - "refundedTotal"), 0) AS "netSales",
    COALESCE(ROUND(AVG("paidTotal" - "refundedTotal"), 2), 0) AS "averageOrderValue"
  FROM "EcommerceOrder"
  WHERE status IN ('PAID', 'FULFILLED', 'REFUNDED')
    AND "paidAt" >= $1::timestamptz
    AND "paidAt" < $2::timestamptz
  GROUP BY channel
  ORDER BY "netSales" DESC, channel ASC;
parameters:
  - name: from
    type: string
    description: Inclusive ISO-8601 UTC sales window start.
  - name: to
    type: string
    description: Exclusive ISO-8601 UTC sales window end.
---
kind: tool
name: list-ecommerce-top-products
type: postgres-sql
source: agent-template-postgres
description: |
  Rank synthetic ecommerce products by paid quantity, gross merchandise sales, and net merchandise sales.
  Order-level refunds are allocated proportionally to merchandise; shipping is excluded.
statement: |
  WITH settled_items AS (
    SELECT
      item."productId",
      item.quantity,
      item."lineTotal",
      item."lineTotal" * (
        1 - COALESCE(orders."refundedTotal" / NULLIF(orders."paidTotal", 0), 0)
      ) AS "netMerchandiseSales"
    FROM "EcommerceOrderItem" AS item
    JOIN "EcommerceOrder" AS orders ON orders.id = item."orderId"
    WHERE orders.status IN ('PAID', 'FULFILLED', 'REFUNDED')
      AND orders."paidAt" >= $1::timestamptz
      AND orders."paidAt" < $2::timestamptz
  )
  SELECT
    product.sku,
    product.name AS "productName",
    product.category,
    SUM(item.quantity)::int AS "unitsSold",
    COALESCE(SUM(item."lineTotal"), 0) AS "grossMerchandiseSales",
    COALESCE(SUM(item."netMerchandiseSales"), 0) AS "netMerchandiseSales"
  FROM settled_items AS item
  JOIN "EcommerceProduct" AS product ON product.id = item."productId"
  GROUP BY product.id, product.sku, product.name, product.category
  ORDER BY "netMerchandiseSales" DESC, "unitsSold" DESC, product.sku ASC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: Inclusive ISO-8601 UTC sales window start.
  - name: to
    type: string
    description: Exclusive ISO-8601 UTC sales window end.
  - name: limit
    type: integer
    description: Maximum number of products to return.
    default: 20
    minValue: 1
    maxValue: 100
---
kind: tool
name: list-ecommerce-orders-in-window
type: postgres-sql
source: agent-template-postgres
description: |
  List a bounded operational order view for the synthetic ecommerce dataset.
  Customer data is limited to synthetic customer code, segment, and region; no direct contact data is returned.
statement: |
  SELECT
    orders."orderNumber",
    orders.status::text AS status,
    orders.channel::text AS channel,
    customer."customerCode",
    customer.segment::text AS "customerSegment",
    customer.region,
    customer.city,
    orders."placedAt",
    orders."paidAt",
    orders."fulfilledAt",
    orders."paidTotal",
    orders."refundedTotal"
  FROM "EcommerceOrder" AS orders
  JOIN "EcommerceCustomer" AS customer ON customer.id = orders."customerId"
  WHERE orders."placedAt" >= $1::timestamptz
    AND orders."placedAt" < $2::timestamptz
  ORDER BY orders."placedAt" DESC, orders.id DESC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: Inclusive ISO-8601 UTC operational window start.
  - name: to
    type: string
    description: Exclusive ISO-8601 UTC operational window end.
  - name: limit
    type: integer
    description: Maximum number of orders to return.
    default: 50
    minValue: 1
    maxValue: 100
---
kind: tool
name: get-ecommerce-order-detail
type: postgres-sql
source: agent-template-postgres
description: |
  Return one synthetic ecommerce order with its customer business context and line items.
  Use this tool only when the user provides a concrete orderNumber.
statement: |
  SELECT
    orders."orderNumber",
    orders.status::text AS status,
    orders.channel::text AS channel,
    customer."customerCode",
    customer.segment::text AS "customerSegment",
    customer.region,
    customer.city,
    orders."placedAt",
    orders."paidAt",
    orders."fulfilledAt",
    orders.subtotal,
    orders."discountTotal",
    orders."shippingTotal",
    orders."paidTotal",
    orders."refundedTotal",
    COALESCE(
      JSONB_AGG(
        JSONB_BUILD_OBJECT(
          'sku', item.sku,
          'productName', item."productName",
          'category', item.category,
          'unitPrice', item."unitPrice",
          'quantity', item.quantity,
          'discountTotal', item."discountTotal",
          'lineTotal', item."lineTotal"
        )
        ORDER BY item.sku ASC
      ) FILTER (WHERE item.id IS NOT NULL),
      '[]'::jsonb
    ) AS items
  FROM "EcommerceOrder" AS orders
  JOIN "EcommerceCustomer" AS customer ON customer.id = orders."customerId"
  LEFT JOIN "EcommerceOrderItem" AS item ON item."orderId" = orders.id
  WHERE orders."orderNumber" = $1
  GROUP BY orders.id, customer.id
  LIMIT 1;
parameters:
  - name: orderNumber
    type: string
    description: Concrete ecommerce order number, for example EC20260601001.
---
kind: tool
name: list-ecommerce-fulfillment-exceptions
type: postgres-sql
source: agent-template-postgres
description: |
  List paid synthetic ecommerce orders that have not yet been fulfilled in a bounded UTC time window.
  Use this read-only tool for fulfillment-operations validation.
statement: |
  SELECT
    orders."orderNumber",
    customer."customerCode",
    customer.region,
    orders.channel::text AS channel,
    orders."paidAt",
    orders."paidTotal",
    ROUND(EXTRACT(EPOCH FROM ($2::timestamptz - orders."paidAt")) / 3600, 2) AS "hoursWaiting"
  FROM "EcommerceOrder" AS orders
  JOIN "EcommerceCustomer" AS customer ON customer.id = orders."customerId"
  WHERE orders.status = 'PAID'
    AND orders."paidAt" >= $1::timestamptz
    AND orders."paidAt" < $2::timestamptz
    AND orders."fulfilledAt" IS NULL
  ORDER BY orders."paidAt" ASC, orders.id ASC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: Inclusive ISO-8601 UTC paid-order window start.
  - name: to
    type: string
    description: Exclusive ISO-8601 UTC paid-order window end and the waiting-time reference.
  - name: limit
    type: integer
    description: Maximum number of fulfillment exceptions to return.
    default: 50
    minValue: 1
    maxValue: 100
---
kind: tool
name: list-template-events
type: postgres-sql
source: agent-template-postgres
description: |
  List template events from the last 30 days for read-only Agent inspection.
  Use this tool only when the user asks about recent Agent platform events.
statement: |
  SELECT id, type, payload, "createdAt"
  FROM "TemplateEvent"
  WHERE "createdAt" >= NOW() - INTERVAL '30 days'
  ORDER BY "createdAt" DESC
  LIMIT $1;
parameters:
  - name: limit
    type: integer
    description: Maximum number of events to return.
    default: 20
    minValue: 1
    maxValue: 100
---
kind: tool
name: get-template-event
type: postgres-sql
source: agent-template-postgres
description: |
  Fetch one template event by id for read-only Agent inspection.
  Use this tool only when the user provides a concrete template event id.
statement: |
  SELECT id, type, payload, "createdAt"
  FROM "TemplateEvent"
  WHERE id = $1
  LIMIT 1;
parameters:
  - name: eventId
    type: string
    description: Template event id.
---
kind: tool
name: list-template-events-in-window
type: postgres-sql
source: agent-template-postgres
description: |
  List template events in an explicit UTC time window for read-only incident investigation.
  Use an ISO-8601 [from, to) window no longer than 31 days and keep the result bounded.
statement: |
  SELECT id, type, payload, "createdAt"
  FROM "TemplateEvent"
  WHERE "createdAt" >= $1::timestamptz
    AND "createdAt" < $2::timestamptz
  ORDER BY "createdAt" DESC, id DESC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: Inclusive ISO-8601 UTC window start, for example 2026-07-01T00:00:00Z.
  - name: to
    type: string
    description: Exclusive ISO-8601 UTC window end, for example 2026-07-02T00:00:00Z.
  - name: limit
    type: integer
    description: Maximum number of events to return.
    default: 50
    minValue: 1
    maxValue: 100
---
kind: tool
name: summarize-template-events-by-type
type: postgres-sql
source: agent-template-postgres
description: |
  Summarize event volume and distinct Agent runs by event type in an explicit UTC time window.
  Use this tool for bounded observability summaries, not to retrieve event payloads.
statement: |
  SELECT
    type,
    COUNT(*)::int AS "eventCount",
    COUNT(DISTINCT payload->>'runId')::int AS "runCount",
    MIN("createdAt") AS "firstEventAt",
    MAX("createdAt") AS "lastEventAt"
  FROM "TemplateEvent"
  WHERE "createdAt" >= $1::timestamptz
    AND "createdAt" < $2::timestamptz
  GROUP BY type
  ORDER BY "eventCount" DESC, type ASC;
parameters:
  - name: from
    type: string
    description: Inclusive ISO-8601 UTC window start.
  - name: to
    type: string
    description: Exclusive ISO-8601 UTC window end.
---
kind: tool
name: list-agent-runs
type: postgres-sql
source: agent-template-postgres
description: |
  List Agent runs seen in the last 30 days from template events.
  Use this tool when the user asks for Agent run summaries or recent runtime outcomes.
statement: |
  SELECT
    payload->>'runId' AS "runId",
    MIN("createdAt") AS "firstEventAt",
    MAX("createdAt") AS "lastEventAt",
    COUNT(*)::int AS "eventCount",
    (ARRAY_AGG(type ORDER BY "createdAt" DESC, id DESC)
      FILTER (WHERE type IN ('agent.run.completed', 'agent.run.failed')))[1] AS "terminalEvent"
  FROM "TemplateEvent"
  WHERE payload->>'runId' IS NOT NULL
    AND "createdAt" >= NOW() - INTERVAL '30 days'
  GROUP BY payload->>'runId'
  ORDER BY MAX("createdAt") DESC
  LIMIT $1;
parameters:
  - name: limit
    type: integer
    description: Maximum number of Agent runs to return.
    default: 20
    minValue: 1
    maxValue: 100
---
kind: tool
name: get-agent-run-summary
type: postgres-sql
source: agent-template-postgres
description: |
  Return one Agent run's read-only lifecycle summary.
  Use this tool only when the user provides a concrete runId.
statement: |
  SELECT
    payload->>'runId' AS "runId",
    MIN("createdAt") AS "firstEventAt",
    MAX("createdAt") AS "lastEventAt",
    COUNT(*)::int AS "eventCount",
    (ARRAY_AGG(type ORDER BY "createdAt" DESC, id DESC)
      FILTER (WHERE type IN ('agent.run.completed', 'agent.run.failed')))[1] AS "terminalEvent"
  FROM "TemplateEvent"
  WHERE payload->>'runId' = $1
  GROUP BY payload->>'runId'
  LIMIT 1;
parameters:
  - name: runId
    type: string
    description: Agent run id.
---
kind: tool
name: list-agent-run-timeline
type: postgres-sql
source: agent-template-postgres
description: |
  List the event timeline for one Agent run.
  Use this tool only when the user provides a concrete runId.
statement: |
  SELECT id, type, payload, "createdAt"
  FROM "TemplateEvent"
  WHERE payload->>'runId' = $1
  ORDER BY "createdAt" ASC, id ASC
  LIMIT $2;
parameters:
  - name: runId
    type: string
    description: Agent run id.
  - name: limit
    type: integer
    description: Maximum number of events to return from one run timeline.
    default: 100
    minValue: 1
    maxValue: 200
---
kind: tool
name: list-failed-agent-runs-in-window
type: postgres-sql
source: agent-template-postgres
description: |
  List Agent failure events in an explicit UTC time window for read-only incident triage.
  The query returns only failure facts and does not allow arbitrary event filtering.
statement: |
  SELECT
    payload->>'runId' AS "runId",
    payload->>'reason' AS reason,
    CASE payload->>'retryable'
      WHEN 'true' THEN true
      WHEN 'false' THEN false
      ELSE NULL
    END AS retryable,
    "createdAt" AS "failedAt"
  FROM "TemplateEvent"
  WHERE type = 'agent.run.failed'
    AND "createdAt" >= $1::timestamptz
    AND "createdAt" < $2::timestamptz
  ORDER BY "createdAt" DESC, id DESC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: Inclusive ISO-8601 UTC window start.
  - name: to
    type: string
    description: Exclusive ISO-8601 UTC window end.
  - name: limit
    type: integer
    description: Maximum number of failed runs to return.
    default: 50
    minValue: 1
    maxValue: 100
---
kind: tool
name: summarize-tool-invocations
type: postgres-sql
source: agent-template-postgres
description: |
  Summarize Toolbox invocation count and latency in an explicit UTC time window.
  Use this tool for read-only MCP tool reliability and performance investigation.
statement: |
  WITH invocation_events AS (
    SELECT
      payload->>'toolName' AS "toolName",
      CASE
        WHEN payload->>'latencyMs' ~ '^[0-9]+$' THEN (payload->>'latencyMs')::numeric
        ELSE NULL
      END AS "latencyMs"
    FROM "TemplateEvent"
    WHERE type = 'toolbox.tool.invoked'
      AND "createdAt" >= $1::timestamptz
      AND "createdAt" < $2::timestamptz
  )
  SELECT
    "toolName",
    COUNT(*)::int AS "invocationCount",
    ROUND(AVG("latencyMs"))::int AS "averageLatencyMs",
    ROUND(PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY "latencyMs"))::int AS "p95LatencyMs"
  FROM invocation_events
  WHERE "toolName" IS NOT NULL
  GROUP BY "toolName"
  ORDER BY "invocationCount" DESC, "toolName" ASC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: Inclusive ISO-8601 UTC window start.
  - name: to
    type: string
    description: Exclusive ISO-8601 UTC window end.
  - name: limit
    type: integer
    description: Maximum number of tool summaries to return.
    default: 50
    minValue: 1
    maxValue: 100
---
kind: toolset
name: agent_template_read_model
tools:
  - list-template-events
  - get-template-event
  - list-template-events-in-window
  - summarize-template-events-by-type
  - list-agent-runs
  - get-agent-run-summary
  - list-agent-run-timeline
  - list-failed-agent-runs-in-window
  - summarize-tool-invocations
  - summarize-ecommerce-sales-by-day
  - summarize-ecommerce-sales-by-channel
  - list-ecommerce-top-products
  - list-ecommerce-orders-in-window
  - get-ecommerce-order-detail
  - list-ecommerce-fulfillment-exceptions
