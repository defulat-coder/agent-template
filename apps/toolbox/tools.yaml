kind: source
name: agent-template-postgres
type: postgres
host: ${TOOLBOX_POSTGRES_HOST}
port: ${TOOLBOX_POSTGRES_PORT}
database: ${TOOLBOX_POSTGRES_DATABASE}
user: ${TOOLBOX_POSTGRES_USER}
password: ${TOOLBOX_POSTGRES_PASSWORD}
---
kind: tool
name: summarize-ecommerce-sales-by-day
type: postgres-sql
source: agent-template-postgres
description: |
  按付款日汇总已结算订单（PAID、FULFILLED、REFUNDED）的销售表现。
  grossSales 为 paidTotal 之和，refundAmount 为 refundedTotal 之和，netSales = grossSales - refundAmount。
  返回每日付款订单数和去重买家数，适用于有界 UTC 销售趋势分析。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH settled_orders AS (
    SELECT
      "paidAt"::date AS "salesDate",
      "customerId",
      "paidTotal",
      "refundedTotal"
    FROM "EcommerceOrder"
    WHERE status IN ('PAID', 'FULFILLED', 'REFUNDED')
      AND "paidAt" >= $1::timestamptz
      AND "paidAt" < $2::timestamptz
  )
  SELECT
    "salesDate",
    COUNT(*)::int AS "paidOrderCount",
    COUNT(DISTINCT "customerId")::int AS "buyerCount",
    COALESCE(SUM("paidTotal"), 0) AS "grossSales",
    COALESCE(SUM("refundedTotal"), 0) AS "refundAmount",
    COALESCE(SUM("paidTotal" - "refundedTotal"), 0) AS "netSales"
  FROM settled_orders
  GROUP BY "salesDate"
  ORDER BY "salesDate" ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 销售时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 销售时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
---
kind: tool
name: summarize-ecommerce-sales-by-channel
type: postgres-sql
source: agent-template-postgres
description: |
  对比 Web、小程序、平台和直播渠道的已结算订单（PAID、FULFILLED、REFUNDED）。
  grossSales 为付款总额，refundAmount 为退款总额，netSales 为两者差额，averageOrderValue 为平均单笔净销售额。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT
    channel::text AS channel,
    COUNT(*)::int AS "paidOrderCount",
    COUNT(DISTINCT "customerId")::int AS "buyerCount",
    COALESCE(SUM("paidTotal"), 0) AS "grossSales",
    COALESCE(SUM("refundedTotal"), 0) AS "refundAmount",
    COALESCE(SUM("paidTotal" - "refundedTotal"), 0) AS "netSales",
    COALESCE(ROUND(AVG("paidTotal" - "refundedTotal"), 2), 0) AS "averageOrderValue"
  FROM "EcommerceOrder"
  WHERE status IN ('PAID', 'FULFILLED', 'REFUNDED')
    AND "paidAt" >= $1::timestamptz
    AND "paidAt" < $2::timestamptz
  GROUP BY channel
  ORDER BY "netSales" DESC, channel ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 销售时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 销售时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
---
kind: tool
name: list-ecommerce-top-products
type: postgres-sql
source: agent-template-postgres
description: |
  按已结算订单的销量、grossMerchandiseSales 和 netMerchandiseSales 对合成电商商品排行。
  订单级 refundedTotal 按商品 lineTotal 占 paidTotal 的比例分摊；商品销售额不包含运费。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH settled_items AS (
    SELECT
      item."productId",
      item.quantity,
      item."lineTotal",
      item."lineTotal" * (
        1 - COALESCE(orders."refundedTotal" / NULLIF(orders."paidTotal", 0), 0)
      ) AS "netMerchandiseSales"
    FROM "EcommerceOrderItem" AS item
    JOIN "EcommerceOrder" AS orders ON orders.id = item."orderId"
    WHERE orders.status IN ('PAID', 'FULFILLED', 'REFUNDED')
      AND orders."paidAt" >= $1::timestamptz
      AND orders."paidAt" < $2::timestamptz
  )
  SELECT
    product.sku,
    product.name AS "productName",
    product.category,
    SUM(item.quantity)::int AS "unitsSold",
    COALESCE(SUM(item."lineTotal"), 0) AS "grossMerchandiseSales",
    COALESCE(SUM(item."netMerchandiseSales"), 0) AS "netMerchandiseSales"
  FROM settled_items AS item
  JOIN "EcommerceProduct" AS product ON product.id = item."productId"
  GROUP BY product.id, product.sku, product.name, product.category
  ORDER BY "netMerchandiseSales" DESC, "unitsSold" DESC, product.sku ASC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 销售时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 销售时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
  - name: limit
    type: integer
    description: 最多返回的商品数量。
    default: 20
    minValue: 1
    maxValue: 100
---
kind: tool
name: list-ecommerce-orders-in-window
type: postgres-sql
source: agent-template-postgres
description: |
  返回合成电商数据的有界订单运营视图。
  时间口径为 placedAt；客户数据仅包含合成客户编码、分群和地区，不返回直接联系方式。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT
    orders."orderNumber",
    orders.status::text AS status,
    orders.channel::text AS channel,
    customer."customerCode",
    customer.segment::text AS "customerSegment",
    customer.region,
    customer.city,
    orders."placedAt",
    orders."paidAt",
    orders."fulfilledAt",
    orders."paidTotal",
    orders."refundedTotal"
  FROM "EcommerceOrder" AS orders
  JOIN "EcommerceCustomer" AS customer ON customer.id = orders."customerId"
  WHERE orders."placedAt" >= $1::timestamptz
    AND orders."placedAt" < $2::timestamptz
  ORDER BY orders."placedAt" DESC, orders.id DESC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 订单运营时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 订单运营时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
  - name: limit
    type: integer
    description: 最多返回的订单数量。
    default: 50
    minValue: 1
    maxValue: 100
---
kind: tool
name: get-ecommerce-order-detail
type: postgres-sql
source: agent-template-postgres
description: |
  返回一笔合成电商订单及其客户业务背景和订单项。
  通过明确的 orderNumber 精确查询，返回的客户信息仅为合成业务属性。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT
    orders."orderNumber",
    orders.status::text AS status,
    orders.channel::text AS channel,
    customer."customerCode",
    customer.segment::text AS "customerSegment",
    customer.region,
    customer.city,
    orders."placedAt",
    orders."paidAt",
    orders."fulfilledAt",
    orders.subtotal,
    orders."discountTotal",
    orders."shippingTotal",
    orders."paidTotal",
    orders."refundedTotal",
    COALESCE(
      JSONB_AGG(
        JSONB_BUILD_OBJECT(
          'sku', item.sku,
          'productName', item."productName",
          'category', item.category,
          'unitPrice', item."unitPrice",
          'quantity', item.quantity,
          'discountTotal', item."discountTotal",
          'lineTotal', item."lineTotal"
        )
        ORDER BY item.sku ASC
      ) FILTER (WHERE item.id IS NOT NULL),
      '[]'::jsonb
    ) AS items
  FROM "EcommerceOrder" AS orders
  JOIN "EcommerceCustomer" AS customer ON customer.id = orders."customerId"
  LEFT JOIN "EcommerceOrderItem" AS item ON item."orderId" = orders.id
  WHERE orders."orderNumber" = $1
  GROUP BY orders.id, customer.id
  LIMIT 1;
parameters:
  - name: orderNumber
    type: string
    description: 明确的电商订单号，例如 EC20260601001。
---
kind: tool
name: list-ecommerce-fulfillment-exceptions
type: postgres-sql
source: agent-template-postgres
description: |
  列出有界 UTC 时间窗内 status = PAID 且 fulfilledAt 为空的合成电商订单。
  hoursWaiting 以参数 to 为等待时长参考时刻，不代表实时系统时间。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT
    orders."orderNumber",
    customer."customerCode",
    customer.region,
    orders.channel::text AS channel,
    orders."paidAt",
    orders."paidTotal",
    ROUND(EXTRACT(EPOCH FROM ($2::timestamptz - orders."paidAt")) / 3600, 2) AS "hoursWaiting"
  FROM "EcommerceOrder" AS orders
  JOIN "EcommerceCustomer" AS customer ON customer.id = orders."customerId"
  WHERE orders.status = 'PAID'
    AND orders."paidAt" >= $1::timestamptz
    AND orders."paidAt" < $2::timestamptz
    AND orders."fulfilledAt" IS NULL
  ORDER BY orders."paidAt" ASC, orders.id ASC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 已付款订单时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 已付款订单时间窗结束时间（不包含），同时作为等待时长参考时间，例如 2026-06-02T00:00:00Z。
  - name: limit
    type: integer
    description: 最多返回的履约异常订单数量。
    default: 50
    minValue: 1
    maxValue: 100
---
kind: tool
name: list-template-events
type: postgres-sql
source: agent-template-postgres
description: |
  返回最近 30 天的模板事件，用于 Agent 平台近期事件巡检。
  结果按 createdAt 倒序且受 limit 限制，payload 为内部合成观测数据。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT id, type, payload, "createdAt"
  FROM "TemplateEvent"
  WHERE "createdAt" >= NOW() - INTERVAL '30 days'
  ORDER BY "createdAt" DESC
  LIMIT $1;
parameters:
  - name: limit
    type: integer
    description: 最多返回的事件数量。
    default: 20
    minValue: 1
    maxValue: 100
---
kind: tool
name: get-template-event
type: postgres-sql
source: agent-template-postgres
description: |
  通过明确的 eventId 返回一条模板事件，用于精确的只读 Agent 事件核查。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT id, type, payload, "createdAt"
  FROM "TemplateEvent"
  WHERE id = $1
  LIMIT 1;
parameters:
  - name: eventId
    type: string
    description: 明确的模板事件 ID。
---
kind: tool
name: list-template-events-in-window
type: postgres-sql
source: agent-template-postgres
description: |
  返回明确 UTC [from, to) 时间窗内的模板事件，用于有界的只读故障调查。
  时间窗最长 31 天，结果按 createdAt 倒序且受 limit 限制。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT id, type, payload, "createdAt"
  FROM "TemplateEvent"
  WHERE "createdAt" >= $1::timestamptz
    AND "createdAt" < $2::timestamptz
  ORDER BY "createdAt" DESC, id DESC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
  - name: limit
    type: integer
    description: 最多返回的事件数量。
    default: 50
    minValue: 1
    maxValue: 100
---
kind: tool
name: summarize-template-events-by-type
type: postgres-sql
source: agent-template-postgres
description: |
  按事件类型汇总明确 UTC [from, to) 时间窗内的 eventCount 和去重 runCount。
  同时返回 firstEventAt 与 lastEventAt，不返回事件 payload。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT
    type,
    COUNT(*)::int AS "eventCount",
    COUNT(DISTINCT payload->>'runId')::int AS "runCount",
    MIN("createdAt") AS "firstEventAt",
    MAX("createdAt") AS "lastEventAt"
  FROM "TemplateEvent"
  WHERE "createdAt" >= $1::timestamptz
    AND "createdAt" < $2::timestamptz
  GROUP BY type
  ORDER BY "eventCount" DESC, type ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
---
kind: tool
name: list-agent-runs
type: postgres-sql
source: agent-template-postgres
description: |
  从模板事件中汇总最近 30 天的 Agent run，返回首末事件时间、事件数和最终终止事件。
  terminalEvent 取该 run 最后一个 agent.run.completed 或 agent.run.failed。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT
    payload->>'runId' AS "runId",
    MIN("createdAt") AS "firstEventAt",
    MAX("createdAt") AS "lastEventAt",
    COUNT(*)::int AS "eventCount",
    (ARRAY_AGG(type ORDER BY "createdAt" DESC, id DESC)
      FILTER (WHERE type IN ('agent.run.completed', 'agent.run.failed')))[1] AS "terminalEvent"
  FROM "TemplateEvent"
  WHERE payload->>'runId' IS NOT NULL
    AND "createdAt" >= NOW() - INTERVAL '30 days'
  GROUP BY payload->>'runId'
  ORDER BY MAX("createdAt") DESC
  LIMIT $1;
parameters:
  - name: limit
    type: integer
    description: 最多返回的 Agent run 数量。
    default: 20
    minValue: 1
    maxValue: 100
---
kind: tool
name: get-agent-run-summary
type: postgres-sql
source: agent-template-postgres
description: |
  通过明确的 runId 返回一个 Agent run 的只读生命周期摘要。
  terminalEvent 取该 run 最后一个 agent.run.completed 或 agent.run.failed。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT
    payload->>'runId' AS "runId",
    MIN("createdAt") AS "firstEventAt",
    MAX("createdAt") AS "lastEventAt",
    COUNT(*)::int AS "eventCount",
    (ARRAY_AGG(type ORDER BY "createdAt" DESC, id DESC)
      FILTER (WHERE type IN ('agent.run.completed', 'agent.run.failed')))[1] AS "terminalEvent"
  FROM "TemplateEvent"
  WHERE payload->>'runId' = $1
  GROUP BY payload->>'runId'
  LIMIT 1;
parameters:
  - name: runId
    type: string
    description: 明确的 Agent run ID。
---
kind: tool
name: list-agent-run-timeline
type: postgres-sql
source: agent-template-postgres
description: |
  通过明确的 runId 返回一个 Agent run 的有界事件时间线。
  结果按 createdAt 正序且受 limit 限制，便于重建完整调用顺序。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT id, type, payload, "createdAt"
  FROM "TemplateEvent"
  WHERE payload->>'runId' = $1
  ORDER BY "createdAt" ASC, id ASC
  LIMIT $2;
parameters:
  - name: runId
    type: string
    description: 明确的 Agent run ID。
  - name: limit
    type: integer
    description: 一条 run 时间线最多返回的事件数量。
    default: 100
    minValue: 1
    maxValue: 200
---
kind: tool
name: list-failed-agent-runs-in-window
type: postgres-sql
source: agent-template-postgres
description: |
  返回明确 UTC [from, to) 时间窗内的 agent.run.failed 事件，用于只读故障分诊。
  结果仅包含 runId、reason、retryable 和 failedAt，不接受任意事件类型过滤。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT
    payload->>'runId' AS "runId",
    payload->>'reason' AS reason,
    CASE payload->>'retryable'
      WHEN 'true' THEN true
      WHEN 'false' THEN false
      ELSE NULL
    END AS retryable,
    "createdAt" AS "failedAt"
  FROM "TemplateEvent"
  WHERE type = 'agent.run.failed'
    AND "createdAt" >= $1::timestamptz
    AND "createdAt" < $2::timestamptz
  ORDER BY "createdAt" DESC, id DESC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
  - name: limit
    type: integer
    description: 最多返回的失败 run 数量。
    default: 50
    minValue: 1
    maxValue: 100
---
kind: tool
name: summarize-tool-invocations
type: postgres-sql
source: agent-template-postgres
description: |
  按 toolName 汇总明确 UTC [from, to) 时间窗内的 Toolbox 调用量、平均延迟和 P95 延迟。
  仅计算可解析为非负数字的 latencyMs，用于只读 MCP Tool 可靠性和性能调查。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH invocation_events AS (
    SELECT
      payload->>'toolName' AS "toolName",
      CASE
        WHEN payload->>'latencyMs' ~ '^[0-9]+$' THEN (payload->>'latencyMs')::numeric
        ELSE NULL
      END AS "latencyMs"
    FROM "TemplateEvent"
    WHERE type = 'toolbox.tool.invoked'
      AND "createdAt" >= $1::timestamptz
      AND "createdAt" < $2::timestamptz
  )
  SELECT
    "toolName",
    COUNT(*)::int AS "invocationCount",
    ROUND(AVG("latencyMs"))::int AS "averageLatencyMs",
    ROUND(PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY "latencyMs"))::int AS "p95LatencyMs"
  FROM invocation_events
  WHERE "toolName" IS NOT NULL
  GROUP BY "toolName"
  ORDER BY "invocationCount" DESC, "toolName" ASC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
  - name: limit
    type: integer
    description: 最多返回的 Tool 汇总数量。
    default: 50
    minValue: 1
    maxValue: 100
