kind: semantic-query-evaluation
catalog: synthetic-supply-chain-operations
version: 1
cases:
  - id: inventory-health-route
    category: route
    question: 最近库存健康情况如何？
    expected:
      intent: inventory_health
      tool: summarize_inventory_health
      terms: [inventory_risk_level, available_units, inventory_value]
      requiresClarification: false
  - id: stockout-route
    category: route
    question: 列出可用库存低于安全库存的 SKU
    expected:
      intent: stockout_risks
      tool: list_stockout_risks
      terms: [stock_gap_units, warehouse]
      requiresClarification: false
  - id: warehouse-route
    category: route
    question: 各仓库可用库存和库存金额是多少？
    expected:
      intent: warehouse_inventory
      tool: summarize_inventory_by_warehouse
      terms: [warehouse, available_units, inventory_value]
      requiresClarification: false
  - id: procurement-route
    category: route
    question: 各采购品类的采购金额和延期单量
    expected:
      intent: procurement_spend
      tool: summarize_procurement_spend
      terms: [supplier_category, procurement_amount, delayed_purchase_orders]
      requiresClarification: false
  - id: supplier-route
    category: route
    question: 哪些供应商准时率最高？
    expected:
      intent: supplier_performance
      tool: summarize_supplier_performance
      terms: [supplier, supplier_on_time_rate]
      requiresClarification: false
  - id: purchase-exception-route
    category: route
    question: 列出已经延期的采购单
    expected:
      intent: purchase_order_exceptions
      tool: list_purchase_order_exceptions
      terms: [purchase_order_exception_total]
      requiresClarification: false
  - id: ambiguous-inventory
    category: ambiguity
    question: 我们现在库存怎么样？
    expected:
      ambiguity: 库存
      requiresClarification: true
  - id: empty-future-inventory
    category: empty-result
    question: 查询 2027 年的库存健康情况
    expected:
      intent: inventory_health
      tool: summarize_inventory_health
      terms: [available_units]
      requiresClarification: false
  - id: delayed-purchase-exception
    category: exception
    question: 哪些未收货采购单已经超过预计到货时间？
    expected:
      intent: purchase_order_exceptions
      tool: list_purchase_order_exceptions
      terms: [purchase_order_exception_total]
      requiresClarification: false
