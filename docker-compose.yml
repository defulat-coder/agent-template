name: agent-template

x-runtime-environment: &runtime-environment
  NODE_ENV: production
  AGENT_RUNTIME: ${AGENT_RUNTIME:-claude}
  DATABASE_URL: postgresql://project_template:project_template@postgres:5432/project_template?schema=public
  REDIS_URL: redis://redis:6379
  TOOLBOX_URL: http://toolbox:15000
  AGENT_CAPABILITY_PROFILE: development-all
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
  ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.kimi.com/coding/}
  ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-kimi-for-coding}
  CLAUDE_AGENT_MODEL: ${CLAUDE_AGENT_MODEL:-kimi-for-coding}
  EVE_AGENT_HOST: ${EVE_AGENT_HOST:-http://eve-agent:13010}
  EVE_AGENT_MODEL: ${EVE_AGENT_MODEL:-kimi-for-coding}
  EVE_AGENT_SERVICE_TOKEN: ${EVE_AGENT_SERVICE_TOKEN:-}
  CLAUDE_CODE_AUTO_COMPACT_WINDOW: ${CLAUDE_CODE_AUTO_COMPACT_WINDOW:-262144}

x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile
    provenance: false

x-app-service: &app-service
  <<: *app-build
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: project_template
      POSTGRES_PASSWORD: project_template
      POSTGRES_DB: project_template
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project_template -d project_template"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-migrate:
    <<: *app-build
    command: pnpm db:deploy
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://project_template:project_template@postgres:5432/project_template?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  toolbox:
    image: us-central1-docker.pkg.dev/database-toolbox/toolbox/toolbox:1.6.0
    restart: unless-stopped
    command:
      [
        "--address",
        "0.0.0.0",
        "--port",
        "15000",
        "--allowed-hosts",
        "localhost,localhost:15000,127.0.0.1,127.0.0.1:15000,toolbox,toolbox:15000",
        "--allowed-origins",
        "http://localhost:13000,http://localhost:14000",
        "--config",
        "/app/tools.yaml",
      ]
    environment:
      TOOLBOX_POSTGRES_HOST: postgres
      TOOLBOX_POSTGRES_PORT: 5432
      TOOLBOX_POSTGRES_DATABASE: project_template
      TOOLBOX_POSTGRES_USER: project_template
      TOOLBOX_POSTGRES_PASSWORD: project_template
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:15000:15000"
    volumes:
      - ./apps/toolbox/tools.yaml:/app/tools.yaml:ro

  api:
    <<: *app-service
    command: pnpm --filter @agent-template/api start
    environment:
      <<: *runtime-environment
      API_HOST: 0.0.0.0
      API_PORT: 14000
      AGENT_API_TOKEN: ${AGENT_API_TOKEN:?set AGENT_API_TOKEN to at least 16 characters}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      toolbox:
        condition: service_started
      eve-agent:
        condition: service_healthy
    ports:
      - "14000:14000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:14000/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 10

  worker:
    <<: *app-service
    command: pnpm --filter @agent-template/worker start
    environment:
      <<: *runtime-environment
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      toolbox:
        condition: service_started
      eve-agent:
        condition: service_healthy

  eve-agent:
    <<: *app-service
    command: sh -c "pnpm --filter @agent-template/agent-eve eve:build && pnpm --filter @agent-template/agent-eve eve:start"
    environment:
      <<: *runtime-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      toolbox:
        condition: service_started
    ports:
      - "127.0.0.1:13010:13010"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:13010/eve/v1/health >/dev/null",
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    <<: *app-service
    command: pnpm --filter @agent-template/web start
    environment:
      NODE_ENV: production
      AGENT_API_URL: http://api:14000
      AGENT_TEMPLATE_TOKEN: ${AGENT_API_TOKEN:?set AGENT_API_TOKEN to at least 16 characters}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "13000:13000"

volumes:
  postgres_data:
  redis_data:
