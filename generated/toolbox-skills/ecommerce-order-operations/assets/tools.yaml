kind: tool
name: summarize_sales_by_customer_segment
type: postgres-sql
source: agent-template-postgres
description: |
  按合成客户分群汇总已结算订单（PAID、FULFILLED、REFUNDED）的销售表现。
  customerSegment 使用数据库枚举值 NEW、ACTIVE、VIP、AT_RISK；grossSales、refundAmount、netSales 与 averageOrderValue 口径和销售趋势 Tool 一致。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    customer.segment::text AS "customerSegment",
    COUNT(*)::int AS "paidOrderCount",
    COUNT(DISTINCT orders."customerId")::int AS "buyerCount",
    COALESCE(SUM(orders."paidTotal"), 0) AS "grossSales",
    COALESCE(SUM(orders."refundedTotal"), 0) AS "refundAmount",
    COALESCE(SUM(orders."paidTotal" - orders."refundedTotal"), 0) AS "netSales",
    COALESCE(
      ROUND(AVG(orders."paidTotal" - orders."refundedTotal"), 2),
      0
    ) AS "averageOrderValue"
  FROM "ecommerce_fixture"."EcommerceOrder" AS orders
  JOIN "ecommerce_fixture"."EcommerceCustomer" AS customer ON customer.id = orders."customerId"
  CROSS JOIN toolbox_window
  WHERE orders.status IN ('PAID', 'FULFILLED', 'REFUNDED')
    AND orders."paidAt" >= toolbox_window.window_from
    AND orders."paidAt" < toolbox_window.window_to
  GROUP BY customer.segment
  ORDER BY "netSales" DESC, "customerSegment" ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 销售时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
