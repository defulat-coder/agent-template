kind: tool
name: list-template-events
type: postgres-sql
source: agent-template-postgres
description: |
  返回最近 30 天的模板事件，用于 Agent 平台近期事件巡检。
  结果按 createdAt 倒序且受 limit 限制，payload 为内部合成观测数据。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT id, type, payload, "createdAt"
  FROM public."TemplateEvent"
  WHERE "createdAt" >= NOW() - INTERVAL '30 days'
  ORDER BY "createdAt" DESC
  LIMIT $1;
parameters:
  - name: limit
    type: integer
    description: 最多返回的事件数量。
    default: 20
    minValue: 1
    maxValue: 100
---
kind: tool
name: get-template-event
type: postgres-sql
source: agent-template-postgres
description: |
  通过明确的 eventId 返回一条模板事件，用于精确的只读 Agent 事件核查。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT id, type, payload, "createdAt"
  FROM public."TemplateEvent"
  WHERE id = $1
  LIMIT 1;
parameters:
  - name: eventId
    type: string
    description: 明确的模板事件 ID。
---
kind: tool
name: list-template-events-in-window
type: postgres-sql
source: agent-template-postgres
description: |
  返回明确 UTC [from, to) 时间窗内的模板事件，用于有界的只读故障调查。
  时间窗最长 31 天，结果按 createdAt 倒序且受 limit 限制。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT id, type, payload, "createdAt"
  FROM public."TemplateEvent"
  CROSS JOIN toolbox_window
  WHERE "createdAt" >= toolbox_window.window_from
    AND "createdAt" < toolbox_window.window_to
  ORDER BY "createdAt" DESC, id DESC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
  - name: limit
    type: integer
    description: 最多返回的事件数量。
    default: 50
    minValue: 1
    maxValue: 100
---
kind: tool
name: summarize-template-events-by-type
type: postgres-sql
source: agent-template-postgres
description: |
  按事件类型汇总明确 UTC [from, to) 时间窗内的 eventCount 和去重 runCount。
  同时返回 firstEventAt 与 lastEventAt，不返回事件 payload。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    type,
    COUNT(*)::int AS "eventCount",
    COUNT(DISTINCT payload->>'runId')::int AS "runCount",
    MIN("createdAt") AS "firstEventAt",
    MAX("createdAt") AS "lastEventAt"
  FROM public."TemplateEvent"
  CROSS JOIN toolbox_window
  WHERE "createdAt" >= toolbox_window.window_from
    AND "createdAt" < toolbox_window.window_to
  GROUP BY type
  ORDER BY "eventCount" DESC, type ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
---
kind: tool
name: list-agent-runs
type: postgres-sql
source: agent-template-postgres
description: |
  从持久化 Agent run record 返回最近 30 天的运行摘要。
  status、runtime、model、终态输出和事件数均来自平台 source of truth。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT
    runs.id AS "runId",
    runs.status,
    runs."executionAttempt",
    runs."heartbeatAt",
    runs."leaseExpiresAt",
    runs.runtime,
    runs.model,
    runs."requestedAt",
    runs."startedAt",
    runs."completedAt",
    runs.output,
    runs.reason,
    COUNT(events.id)::int AS "eventCount"
  FROM public."AgentRun" AS runs
  LEFT JOIN public."AgentRunEvent" AS events ON events."runId" = runs.id
  WHERE runs."requestedAt" >= NOW() - INTERVAL '30 days'
  GROUP BY runs.id
  ORDER BY runs."requestedAt" DESC, runs.id DESC
  LIMIT $1;
parameters:
  - name: limit
    type: integer
    description: 最多返回的 Agent run 数量。
    default: 20
    minValue: 1
    maxValue: 100
---
kind: tool
name: get-agent-run-summary
type: postgres-sql
source: agent-template-postgres
description: |
  通过明确的 runId 返回持久化 Agent run record 的只读生命周期摘要。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT
    runs.id AS "runId",
    runs.prompt,
    runs.status,
    runs."executionAttempt",
    runs."heartbeatAt",
    runs."leaseExpiresAt",
    runs.runtime,
    runs.model,
    runs."requestedAt",
    runs."startedAt",
    runs."completedAt",
    runs."cancelRequestedAt",
    runs.output,
    runs.reason,
    runs."sessionId",
    COUNT(events.id)::int AS "eventCount"
  FROM public."AgentRun" AS runs
  LEFT JOIN public."AgentRunEvent" AS events ON events."runId" = runs.id
  WHERE runs.id = $1
  GROUP BY runs.id
  LIMIT 1;
parameters:
  - name: runId
    type: string
    description: 明确的 Agent run ID。
---
kind: tool
name: list-agent-run-timeline
type: postgres-sql
source: agent-template-postgres
description: |
  通过明确的 runId 返回一个 Agent run 的有界事件时间线。
  结果按 createdAt 正序且受 limit 限制，便于重建完整调用顺序。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT id, sequence, "executionAttempt", kind, payload, "createdAt"
  FROM public."AgentRunEvent"
  WHERE "runId" = $1
  ORDER BY sequence ASC
  LIMIT $2;
parameters:
  - name: runId
    type: string
    description: 明确的 Agent run ID。
  - name: limit
    type: integer
    description: 一条 run 时间线最多返回的事件数量。
    default: 100
    minValue: 1
    maxValue: 200
---
kind: tool
name: list-failed-agent-runs-in-window
type: postgres-sql
source: agent-template-postgres
description: |
  返回明确 UTC [from, to) 时间窗内的持久化失败 Agent run，用于只读故障分诊。
  结果仅包含 runId、runtime、model、reason 和 failedAt，不接受任意状态过滤。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    runs.id AS "runId",
    runs.runtime,
    runs.model,
    runs.reason,
    runs."completedAt" AS "failedAt"
  FROM public."AgentRun" AS runs
  CROSS JOIN toolbox_window
  WHERE runs.status = 'failed'
    AND runs."completedAt" >= toolbox_window.window_from
    AND runs."completedAt" < toolbox_window.window_to
  ORDER BY runs."completedAt" DESC, runs.id DESC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
  - name: limit
    type: integer
    description: 最多返回的失败 run 数量。
    default: 50
    minValue: 1
    maxValue: 100
---
kind: tool
name: summarize-tool-invocations
type: postgres-sql
source: agent-template-postgres
description: |
  按 toolName 汇总明确 UTC [from, to) 时间窗内的 Agent Tool 调用量、平均延迟和 P95 延迟。
  延迟由同一 run/callId 的 tool-call 与 tool-result 持久化时间差计算。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  ),
  call_events AS (
    SELECT
      "runId",
      "executionAttempt",
      payload->>'callId' AS "callId",
      payload->>'toolName' AS "toolName",
      "createdAt" AS "calledAt"
    FROM public."AgentRunEvent"
    CROSS JOIN toolbox_window
    WHERE kind = 'tool-call'
      AND "createdAt" >= toolbox_window.window_from
      AND "createdAt" < toolbox_window.window_to
  ),
  result_events AS (
    SELECT
      "runId",
      "executionAttempt",
      payload->>'callId' AS "callId",
      "createdAt" AS "resultAt"
    FROM public."AgentRunEvent"
    WHERE kind = 'tool-result'
  ),
  invocations AS (
    SELECT
      calls."toolName",
      EXTRACT(EPOCH FROM (results."resultAt" - calls."calledAt")) * 1000 AS "latencyMs"
    FROM call_events AS calls
    LEFT JOIN result_events AS results
      ON results."runId" = calls."runId"
      AND results."executionAttempt" = calls."executionAttempt"
      AND results."callId" = calls."callId"
  )
  SELECT
    "toolName",
    COUNT(*)::int AS "invocationCount",
    ROUND(AVG("latencyMs"))::int AS "averageLatencyMs",
    ROUND(PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY "latencyMs"))::int AS "p95LatencyMs"
  FROM invocations
  WHERE "toolName" IS NOT NULL
  GROUP BY "toolName"
  ORDER BY "invocationCount" DESC, "toolName" ASC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
  - name: limit
    type: integer
    description: 最多返回的 Tool 汇总数量。
    default: 50
    minValue: 1
    maxValue: 100
