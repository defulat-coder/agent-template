  已取消采购单不属于异常；delayedDays 使用合成采购记录，对未收货单同时返回相对 to 的 currentDelayedDays。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    purchase."purchaseOrderNumber",
    supplier."supplierCode",
    supplier.name AS "supplierName",
    warehouse."warehouseCode",
    purchase.status::text AS status,
    purchase."orderedAt",
    purchase."expectedAt",
    purchase."receivedAt",
    purchase.amount,
    purchase."skuCount",
    purchase."delayedDays",
    GREATEST(
      purchase."delayedDays",
      FLOOR(EXTRACT(EPOCH FROM (toolbox_window.window_to - purchase."expectedAt")) / 86400)::int
    ) AS "currentDelayedDays",
    COUNT(*) OVER()::int AS "totalCount"
  FROM "ecommerce_fixture"."ProcurementOrder" AS purchase
  JOIN "ecommerce_fixture"."ProcurementSupplier" AS supplier ON supplier.id = purchase."supplierId"
  JOIN "ecommerce_fixture"."InventoryWarehouse" AS warehouse ON warehouse.id = purchase."warehouseId"
  CROSS JOIN toolbox_window
  WHERE purchase."orderedAt" >= toolbox_window.window_from
    AND purchase."orderedAt" < toolbox_window.window_to
    AND purchase.status <> 'CANCELLED'
    AND (
      purchase."delayedDays" > 0
      OR purchase."receivedAt" > purchase."expectedAt"
      OR (purchase."receivedAt" IS NULL AND purchase."expectedAt" < toolbox_window.window_to)
    )
  ORDER BY "currentDelayedDays" DESC, purchase."orderedAt" DESC, purchase.id DESC
  LIMIT $3
  OFFSET $4;
