  availableUnits = onHand - reserved；结果按风险等级、缺口、快照时间和快照 ID 稳定排序。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    snapshot."snapshotDate",
    warehouse."warehouseCode",
    warehouse.name AS "warehouseName",
    product.sku,
    product.name AS "productName",
    snapshot."riskLevel"::text AS "riskLevel",
    snapshot."onHand",
    snapshot.reserved,
    snapshot."onHand" - snapshot.reserved AS "availableUnits",
    snapshot."inTransit",
    snapshot."safetyStock",
    snapshot."safetyStock" - (snapshot."onHand" - snapshot.reserved) AS "stockGapUnits",
    COUNT(*) OVER()::int AS "totalCount"
