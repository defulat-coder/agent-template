  JOIN "ecommerce_fixture"."EcommerceProduct" AS product ON product.id = snapshot."productId"
  CROSS JOIN toolbox_window
  WHERE snapshot."snapshotDate" >= toolbox_window.window_from
    AND snapshot."snapshotDate" < toolbox_window.window_to
    AND (
      snapshot."riskLevel"::text <> 'HEALTHY'
      OR snapshot."onHand" - snapshot.reserved <= snapshot."safetyStock"
    )
  ORDER BY snapshot."riskLevel" DESC, "stockGapUnits" DESC, snapshot."snapshotDate" DESC, snapshot.id DESC
  LIMIT $3
  OFFSET $4;
