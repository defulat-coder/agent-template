kind: tool
name: get-ecommerce-order-detail
type: postgres-sql
source: agent-template-postgres
description: |
  返回一笔合成电商订单及其客户业务背景和订单项。
  通过明确的 orderNumber 精确查询，返回的客户信息仅为合成业务属性。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  SELECT
    orders."orderNumber",
    orders.status::text AS status,
    orders.channel::text AS channel,
    customer."customerCode",
    customer.segment::text AS "customerSegment",
    customer.region,
    customer.city,
    orders."placedAt",
    orders."paidAt",
    orders."fulfilledAt",
    orders.subtotal,
    orders."discountTotal",
    orders."shippingTotal",
    orders."paidTotal",
    orders."refundedTotal",
    COALESCE(
      JSONB_AGG(
        JSONB_BUILD_OBJECT(
          'sku', item.sku,
          'productName', item."productName",
          'category', item.category,
          'unitPrice', item."unitPrice",
          'quantity', item.quantity,
          'discountTotal', item."discountTotal",
          'lineTotal', item."lineTotal"
        )
        ORDER BY item.sku ASC
      ) FILTER (WHERE item.id IS NOT NULL),
      '[]'::jsonb
    ) AS items
  FROM "ecommerce_fixture"."EcommerceOrder" AS orders
  JOIN "ecommerce_fixture"."EcommerceCustomer" AS customer ON customer.id = orders."customerId"
  LEFT JOIN "ecommerce_fixture"."EcommerceOrderItem" AS item ON item."orderId" = orders.id
  WHERE orders."orderNumber" = $1
  GROUP BY orders.id, customer.id
  LIMIT 1;
parameters:
  - name: orderNumber
    type: string
    description: 明确的电商订单号，例如 EC20260601001。
---
kind: tool
name: list-ecommerce-fulfillment-exceptions
type: postgres-sql
source: agent-template-postgres
description: |
  列出有界 UTC 时间窗内 status = PAID 且 fulfilledAt 为空的合成电商订单。
  hoursWaiting 以参数 to 为等待时长参考时刻，不代表实时系统时间。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    orders."orderNumber",
    customer."customerCode",
    customer.region,
    orders.channel::text AS channel,
    orders."paidAt",
    orders."paidTotal",
    ROUND(EXTRACT(EPOCH FROM (toolbox_window.window_to - orders."paidAt")) / 3600, 2) AS "hoursWaiting",
    COUNT(*) OVER()::int AS "totalCount"
  FROM "ecommerce_fixture"."EcommerceOrder" AS orders
  JOIN "ecommerce_fixture"."EcommerceCustomer" AS customer ON customer.id = orders."customerId"
  CROSS JOIN toolbox_window
  WHERE orders.status = 'PAID'
    AND orders."paidAt" >= toolbox_window.window_from
    AND orders."paidAt" < toolbox_window.window_to
    AND orders."fulfilledAt" IS NULL
  ORDER BY orders."paidAt" ASC, orders.id ASC
  LIMIT $3
  OFFSET $4;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 已付款订单时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 已付款订单时间窗结束时间（不包含），同时作为等待时长参考时间，例如 2026-06-02T00:00:00Z。
  - name: limit
    type: integer
    description: 最多返回的履约异常订单数量。
    default: 50
    minValue: 1
    maxValue: 100
  - name: offset
    type: integer
    description: 从稳定排序结果中跳过的履约异常数量，用于分页；首页传 0。
    default: 0
    minValue: 0
    maxValue: 10000
