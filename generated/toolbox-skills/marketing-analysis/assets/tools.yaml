kind: tool
name: summarize-tool-invocations
type: postgres-sql
source: agent-template-postgres
description: |
  按 toolName 汇总明确 UTC [from, to) 时间窗内的 Agent Tool 调用量、平均延迟和 P95 延迟。
  延迟由同一 run/callId 的 tool-call 与 tool-result 持久化时间差计算。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  ),
  call_events AS (
    SELECT
      "runId",
      "executionAttempt",
      payload->>'callId' AS "callId",
      payload->>'toolName' AS "toolName",
      "createdAt" AS "calledAt"
    FROM public."AgentRunEvent"
    CROSS JOIN toolbox_window
    WHERE kind = 'tool-call'
      AND "createdAt" >= toolbox_window.window_from
      AND "createdAt" < toolbox_window.window_to
  ),
  result_events AS (
    SELECT
      "runId",
      "executionAttempt",
      payload->>'callId' AS "callId",
      "createdAt" AS "resultAt"
    FROM public."AgentRunEvent"
    WHERE kind = 'tool-result'
  ),
  invocations AS (
    SELECT
      calls."toolName",
      EXTRACT(EPOCH FROM (results."resultAt" - calls."calledAt")) * 1000 AS "latencyMs"
    FROM call_events AS calls
    LEFT JOIN result_events AS results
      ON results."runId" = calls."runId"
      AND results."executionAttempt" = calls."executionAttempt"
      AND results."callId" = calls."callId"
  )
  SELECT
    "toolName",
    COUNT(*)::int AS "invocationCount",
    ROUND(AVG("latencyMs"))::int AS "averageLatencyMs",
    ROUND(PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY "latencyMs"))::int AS "p95LatencyMs"
  FROM invocations
  WHERE "toolName" IS NOT NULL
  GROUP BY "toolName"
  ORDER BY "invocationCount" DESC, "toolName" ASC
  LIMIT $3;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
  - name: limit
    type: integer
    description: 最多返回的 Tool 汇总数量。
    default: 50
    minValue: 1
    maxValue: 100
---
kind: tool
name: summarize_finance_overview
type: postgres-sql
source: agent-template-postgres
description: |
  汇总明确 UTC 时间窗内已结算订单、支付、退款和发票的经营财务概览。
  grossSales 是订单原支付额，refundAmount 来自 FinanceRefund，netCollected = capturedPayments - refundAmount；这些经营指标不是法定财务报表。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  ),
  orders AS (
    SELECT
      COUNT(*)::int AS "settledOrderCount",
      COALESCE(SUM("paidTotal"), 0) AS "grossSales"
    FROM "ecommerce_fixture"."EcommerceOrder"
    CROSS JOIN toolbox_window
    WHERE status IN ('PAID', 'FULFILLED', 'REFUNDED')
      AND "paidAt" >= toolbox_window.window_from
      AND "paidAt" < toolbox_window.window_to
  ),
  payments AS (
    SELECT COALESCE(SUM(amount), 0) AS "capturedPayments"
    FROM "ecommerce_fixture"."EcommercePayment"
    CROSS JOIN toolbox_window
    WHERE status IN ('SUCCEEDED', 'REFUNDED')
      AND "paidAt" >= toolbox_window.window_from
      AND "paidAt" < toolbox_window.window_to
  ),
  refunds AS (
    SELECT
      COUNT(*) FILTER (WHERE status::text = 'COMPLETED')::int AS "completedRefundCount",
      COALESCE(SUM(amount) FILTER (WHERE status::text = 'COMPLETED'), 0) AS "refundAmount"
    FROM "ecommerce_fixture"."FinanceRefund"
    CROSS JOIN toolbox_window
    WHERE "requestedAt" >= toolbox_window.window_from
      AND "requestedAt" < toolbox_window.window_to
  ),
  invoices AS (
    SELECT
      COALESCE(SUM(amount), 0) AS "invoiceAmount",
      COALESCE(SUM(ABS("mismatchAmount")), 0) AS "invoiceMismatchAmount"
    FROM "ecommerce_fixture"."FinanceInvoice"
    CROSS JOIN toolbox_window
    WHERE "issuedAt" >= toolbox_window.window_from
      AND "issuedAt" < toolbox_window.window_to
  )
  SELECT
    orders."settledOrderCount",
    orders."grossSales",
    payments."capturedPayments",
    refunds."completedRefundCount",
    refunds."refundAmount",
    payments."capturedPayments" - refunds."refundAmount" AS "netCollected",
    invoices."invoiceAmount",
    invoices."invoiceMismatchAmount"
  FROM orders
  CROSS JOIN payments
  CROSS JOIN refunds
  CROSS JOIN invoices;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 财务时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 财务时间窗结束时间（不包含），例如 2026-06-30T00:00:00Z。
---
kind: tool
name: summarize_payment_methods
type: postgres-sql
source: agent-template-postgres
description: |
  按支付方式汇总明确 UTC 财务事件时间窗内的支付笔数、支付金额、已完成退款和净实收。
  capturedPayments 按 paidAt 统计支付；refundAmount 按 FinanceRefund.requestedAt 统计已完成退款并通过 orderId 归属支付方式。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  ),
  payment_summary AS (
    SELECT
      payment.method,
      COUNT(*)::int AS "paymentCount",
      COUNT(*) FILTER (WHERE payment.status::text = 'SUCCEEDED')::int AS "succeededCount",
      COALESCE(SUM(payment.amount), 0) AS "capturedPayments"
    FROM "ecommerce_fixture"."EcommercePayment" AS payment
    CROSS JOIN toolbox_window
    WHERE payment."paidAt" >= toolbox_window.window_from
      AND payment."paidAt" < toolbox_window.window_to
      AND payment.status IN ('SUCCEEDED', 'REFUNDED')
    GROUP BY payment.method
  ),
  refund_summary AS (
    SELECT
      payment.method,
      COUNT(*)::int AS "completedRefundCount",
      COALESCE(SUM(refund.amount), 0) AS "refundAmount"
    FROM "ecommerce_fixture"."FinanceRefund" AS refund
    JOIN "ecommerce_fixture"."EcommercePayment" AS payment ON payment."orderId" = refund."orderId"
    CROSS JOIN toolbox_window
    WHERE refund.status::text = 'COMPLETED'
      AND refund."requestedAt" >= toolbox_window.window_from
      AND refund."requestedAt" < toolbox_window.window_to
    GROUP BY payment.method
  )
  SELECT
    COALESCE(payment.method, refund.method)::text AS "paymentMethod",
    COALESCE(payment."paymentCount", 0) AS "paymentCount",
    COALESCE(payment."succeededCount", 0) AS "succeededCount",
    COALESCE(payment."capturedPayments", 0) AS "capturedPayments",
    COALESCE(refund."completedRefundCount", 0) AS "completedRefundCount",
    COALESCE(refund."refundAmount", 0) AS "refundAmount",
    COALESCE(payment."capturedPayments", 0) - COALESCE(refund."refundAmount", 0) AS "netCollected"
  FROM payment_summary AS payment
  FULL OUTER JOIN refund_summary AS refund ON refund.method = payment.method
  ORDER BY "netCollected" DESC, "paymentMethod" ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 财务事件时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 财务事件时间窗结束时间（不包含），例如 2026-06-30T00:00:00Z。
