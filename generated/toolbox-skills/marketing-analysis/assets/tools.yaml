kind: tool
name: list-ecommerce-orders-in-window
type: postgres-sql
source: agent-template-postgres
description: |
  返回合成电商数据的有界订单运营视图。
  时间口径为 placedAt；客户数据仅包含合成客户编码、分群和地区，不返回直接联系方式。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    orders."orderNumber",
    orders.status::text AS status,
    orders.channel::text AS channel,
