kind: tool
name: list-ecommerce-top-products
type: postgres-sql
source: agent-template-postgres
description: |
  按已结算订单的销量、grossMerchandiseSales 和 netMerchandiseSales 对合成电商商品排行。
  订单级 refundedTotal 按商品 lineTotal 占 paidTotal 的比例分摊；商品销售额不包含运费。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  ),
  settled_items AS (
    SELECT
      item."productId",
      item.quantity,
      item."lineTotal",
      item."lineTotal" * (
        1 - COALESCE(orders."refundedTotal" / NULLIF(orders."paidTotal", 0), 0)
      ) AS "netMerchandiseSales"
    FROM "ecommerce_fixture"."EcommerceOrderItem" AS item
    JOIN "ecommerce_fixture"."EcommerceOrder" AS orders ON orders.id = item."orderId"
    CROSS JOIN toolbox_window
    WHERE orders.status IN ('PAID', 'FULFILLED', 'REFUNDED')
      AND orders."paidAt" >= toolbox_window.window_from
      AND orders."paidAt" < toolbox_window.window_to
  )
  SELECT
    product.sku,
    product.name AS "productName",
    product.category,
    SUM(item.quantity)::int AS "unitsSold",
    COALESCE(SUM(item."lineTotal"), 0) AS "grossMerchandiseSales",
    COALESCE(SUM(item."netMerchandiseSales"), 0) AS "netMerchandiseSales",
    COUNT(*) OVER()::int AS "totalCount"
  FROM settled_items AS item
  JOIN "ecommerce_fixture"."EcommerceProduct" AS product ON product.id = item."productId"
  WHERE $5::text = 'ALL' OR product.category = $5::text
  GROUP BY product.id, product.sku, product.name, product.category
  ORDER BY "netMerchandiseSales" DESC, "unitsSold" DESC, product.sku ASC
  LIMIT $3
  OFFSET $4;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 销售时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 销售时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
  - name: limit
    type: integer
    description: 最多返回的商品数量。
    default: 20
    minValue: 1
    maxValue: 100
  - name: offset
    type: integer
    description: 从稳定排序结果中跳过的商品数量，用于分页；首页传 0。
    default: 0
    minValue: 0
    maxValue: 10000
  - name: category
    type: string
    description: 可选的认证商品品类过滤值；ALL 表示返回全部品类。
    default: ALL
    allowedValues: [ALL, 智能设备, 居家生活, 户外运动, 美妆个护, 母婴用品, 食品饮料]
---
kind: tool
name: summarize_merchandise_by_category
type: postgres-sql
source: agent-template-postgres
description: |
  按商品品类汇总已结算订单项的销量、商品销售额和退款后商品销售额。
  grossMerchandiseSales 不包含运费；netMerchandiseSales 将订单级 refundedTotal 按 lineTotal / paidTotal 分摊到订单项。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  ),
  settled_items AS (
    SELECT
      item.category,
      item.quantity,
      item."lineTotal",
      item."lineTotal" * (
        1 - COALESCE(orders."refundedTotal" / NULLIF(orders."paidTotal", 0), 0)
      ) AS "netMerchandiseSales"
    FROM "ecommerce_fixture"."EcommerceOrderItem" AS item
    JOIN "ecommerce_fixture"."EcommerceOrder" AS orders ON orders.id = item."orderId"
    CROSS JOIN toolbox_window
    WHERE orders.status IN ('PAID', 'FULFILLED', 'REFUNDED')
      AND orders."paidAt" >= toolbox_window.window_from
      AND orders."paidAt" < toolbox_window.window_to
      AND ($3::text = 'ALL' OR item.category = $3::text)
  )
  SELECT
    category,
    SUM(quantity)::int AS "unitsSold",
    COALESCE(SUM("lineTotal"), 0) AS "grossMerchandiseSales",
    COALESCE(SUM("netMerchandiseSales"), 0) AS "netMerchandiseSales"
  FROM settled_items
  GROUP BY category
  ORDER BY "netMerchandiseSales" DESC, "unitsSold" DESC, category ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 销售时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 销售时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
  - name: category
    type: string
    description: 可选的认证商品品类过滤值；ALL 表示返回全部品类。
    default: ALL
    allowedValues: [ALL, 智能设备, 居家生活, 户外运动, 美妆个护, 母婴用品, 食品饮料]
