kind: tool
name: summarize-ecommerce-sales-by-day
type: postgres-sql
source: agent-template-postgres
description: |
  按付款日汇总已结算订单（PAID、FULFILLED、REFUNDED）的销售表现。
  grossSales 为 paidTotal 之和，refundAmount 为 refundedTotal 之和，netSales = grossSales - refundAmount。
  返回每日付款订单数和去重买家数，适用于有界 UTC 销售趋势分析。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  ),
  settled_orders AS (
    SELECT
      ("paidAt" AT TIME ZONE 'UTC')::date AS "salesDate",
      "customerId",
      "paidTotal",
      "refundedTotal"
    FROM "ecommerce_fixture"."EcommerceOrder"
    CROSS JOIN toolbox_window
    WHERE status IN ('PAID', 'FULFILLED', 'REFUNDED')
      AND "paidAt" >= toolbox_window.window_from
      AND "paidAt" < toolbox_window.window_to
  )
  SELECT
    "salesDate",
    COUNT(*)::int AS "paidOrderCount",
    COUNT(DISTINCT "customerId")::int AS "buyerCount",
    COALESCE(SUM("paidTotal"), 0) AS "grossSales",
    COALESCE(SUM("refundedTotal"), 0) AS "refundAmount",
    COALESCE(SUM("paidTotal" - "refundedTotal"), 0) AS "netSales"
  FROM settled_orders
  GROUP BY "salesDate"
  ORDER BY "salesDate" ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 销售时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 销售时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
---
kind: tool
name: summarize-ecommerce-sales-by-channel
type: postgres-sql
source: agent-template-postgres
description: |
  对比 Web、小程序、平台和直播渠道的已结算订单（PAID、FULFILLED、REFUNDED）。
  grossSales 为付款总额，refundAmount 为退款总额，netSales 为两者差额，averageOrderValue 为平均单笔净销售额。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    channel::text AS channel,
    COUNT(*)::int AS "paidOrderCount",
    COUNT(DISTINCT "customerId")::int AS "buyerCount",
    COALESCE(SUM("paidTotal"), 0) AS "grossSales",
    COALESCE(SUM("refundedTotal"), 0) AS "refundAmount",
    COALESCE(SUM("paidTotal" - "refundedTotal"), 0) AS "netSales",
    COALESCE(ROUND(AVG("paidTotal" - "refundedTotal"), 2), 0) AS "averageOrderValue"
  FROM "ecommerce_fixture"."EcommerceOrder"
  CROSS JOIN toolbox_window
  WHERE status IN ('PAID', 'FULFILLED', 'REFUNDED')
    AND "paidAt" >= toolbox_window.window_from
    AND "paidAt" < toolbox_window.window_to
    AND ($3::text = 'ALL' OR channel::text = $3::text)
  GROUP BY channel
  ORDER BY "netSales" DESC, channel ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 销售时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 销售时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
  - name: channel
    type: string
    description: 可选的认证渠道过滤值；ALL 表示返回全部渠道。
    default: ALL
    allowedValues: [ALL, WEB, MINI_PROGRAM, MARKETPLACE, LIVE_STREAM]
---
kind: tool
name: summarize_sales_by_region
type: postgres-sql
source: agent-template-postgres
description: |
  按客户大区汇总已结算订单（PAID、FULFILLED、REFUNDED）的销售表现。
  grossSales 为付款总额，refundAmount 为退款总额，netSales 为两者差额，averageOrderValue 为平均单笔净销售额。
  区域来自合成客户档案 customer.region，仅适用于有界 UTC 付款时间窗，不返回客户联系方式或明细。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    customer.region,
    COUNT(*)::int AS "paidOrderCount",
    COUNT(DISTINCT orders."customerId")::int AS "buyerCount",
    COALESCE(SUM(orders."paidTotal"), 0) AS "grossSales",
    COALESCE(SUM(orders."refundedTotal"), 0) AS "refundAmount",
    COALESCE(SUM(orders."paidTotal" - orders."refundedTotal"), 0) AS "netSales",
    COALESCE(
      ROUND(AVG(orders."paidTotal" - orders."refundedTotal"), 2),
      0
    ) AS "averageOrderValue"
  FROM "ecommerce_fixture"."EcommerceOrder" AS orders
  JOIN "ecommerce_fixture"."EcommerceCustomer" AS customer ON customer.id = orders."customerId"
  CROSS JOIN toolbox_window
  WHERE orders.status IN ('PAID', 'FULFILLED', 'REFUNDED')
    AND orders."paidAt" >= toolbox_window.window_from
    AND orders."paidAt" < toolbox_window.window_to
    AND ($3::text = 'ALL' OR customer.region = $3::text)
  GROUP BY customer.region
  ORDER BY "netSales" DESC, customer.region ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 销售时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 销售时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
  - name: region
    type: string
    description: 可选的认证大区过滤值；ALL 表示返回全部大区。
    default: ALL
    allowedValues: [ALL, 华东, 华北, 华南, 华中, 西南, 西北]
---
kind: tool
name: summarize_sales_by_customer_segment
type: postgres-sql
source: agent-template-postgres
description: |
  按合成客户分群汇总已结算订单（PAID、FULFILLED、REFUNDED）的销售表现。
  customerSegment 使用数据库枚举值 NEW、ACTIVE、VIP、AT_RISK；grossSales、refundAmount、netSales 与 averageOrderValue 口径和销售趋势 Tool 一致。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    customer.segment::text AS "customerSegment",
    COUNT(*)::int AS "paidOrderCount",
    COUNT(DISTINCT orders."customerId")::int AS "buyerCount",
    COALESCE(SUM(orders."paidTotal"), 0) AS "grossSales",
    COALESCE(SUM(orders."refundedTotal"), 0) AS "refundAmount",
    COALESCE(SUM(orders."paidTotal" - orders."refundedTotal"), 0) AS "netSales",
    COALESCE(
      ROUND(AVG(orders."paidTotal" - orders."refundedTotal"), 2),
      0
    ) AS "averageOrderValue"
  FROM "ecommerce_fixture"."EcommerceOrder" AS orders
  JOIN "ecommerce_fixture"."EcommerceCustomer" AS customer ON customer.id = orders."customerId"
  CROSS JOIN toolbox_window
  WHERE orders.status IN ('PAID', 'FULFILLED', 'REFUNDED')
    AND orders."paidAt" >= toolbox_window.window_from
    AND orders."paidAt" < toolbox_window.window_to
    AND ($3::text = 'ALL' OR customer.segment::text = $3::text)
  GROUP BY customer.segment
  ORDER BY "netSales" DESC, "customerSegment" ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 销售时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 销售时间窗结束时间（不包含），例如 2026-06-02T00:00:00Z。
  - name: customerSegment
    type: string
    description: 可选的认证客户分群过滤值；ALL 表示返回全部分群。
    default: ALL
    allowedValues: [ALL, NEW, ACTIVE, VIP, AT_RISK]
