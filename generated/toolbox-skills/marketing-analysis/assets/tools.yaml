kind: tool
name: summarize_campaign_performance
type: postgres-sql
source: agent-template-postgres
description: |
  按营销活动汇总明确 UTC 触点时间窗内的归因订单、归因收入、分摊费用、新客数和 ROAS。
  attributedRevenue 是规则归因结果，不代表增量收入或因果效果；活动 budget/spend 是完整活动档案值。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  ),
  attribution AS (
    SELECT
      "campaignId",
      COUNT(DISTINCT "orderId")::int AS "attributedOrderCount",
      COALESCE(SUM("attributedRevenue"), 0) AS "attributedRevenue",
      COALESCE(SUM("allocatedSpend"), 0) AS "allocatedSpend",
      COUNT(DISTINCT "orderId") FILTER (WHERE "isNewCustomer")::int AS "newCustomerCount"
    FROM "ecommerce_fixture"."MarketingAttribution"
    CROSS JOIN toolbox_window
    WHERE "touchpointAt" >= toolbox_window.window_from
      AND "touchpointAt" < toolbox_window.window_to
    GROUP BY "campaignId"
  )
  SELECT
    campaign."campaignCode",
    campaign.name AS "campaignName",
    campaign.channel::text AS channel,
    campaign.objective::text AS objective,
    campaign."startAt",
    campaign."endAt",
    campaign.budget,
    campaign.spend,
    COALESCE(attribution."attributedOrderCount", 0) AS "attributedOrderCount",
    COALESCE(attribution."attributedRevenue", 0) AS "attributedRevenue",
    COALESCE(attribution."allocatedSpend", 0) AS "allocatedSpend",
    COALESCE(attribution."newCustomerCount", 0) AS "newCustomerCount",
    ROUND(
      COALESCE(attribution."attributedRevenue", 0) / NULLIF(attribution."allocatedSpend", 0),
      4
    ) AS roas
  FROM "ecommerce_fixture"."MarketingCampaign" AS campaign
  CROSS JOIN toolbox_window
  LEFT JOIN attribution ON attribution."campaignId" = campaign.id
  WHERE campaign."startAt" < toolbox_window.window_to
    AND campaign."endAt" >= toolbox_window.window_from
  ORDER BY "attributedRevenue" DESC, campaign."campaignCode" ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 营销触点时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 营销触点时间窗结束时间（不包含），例如 2026-06-30T00:00:00Z。
