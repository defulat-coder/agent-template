kind: tool
name: summarize_marketing_by_channel
type: postgres-sql
source: agent-template-postgres
description: |
  按归因渠道汇总明确 UTC 触点时间窗内的订单、归因收入、分摊费用、新客和 ROAS。
  channel 来自 MarketingAttribution；跨渠道归因可能包含同一订单的多个触点，回答不得直接等同于独立订单总数。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    attribution.channel::text AS channel,
    COUNT(*)::int AS "touchpointCount",
    COUNT(DISTINCT attribution."orderId")::int AS "attributedOrderCount",
    COALESCE(SUM(attribution."attributedRevenue"), 0) AS "attributedRevenue",
    COALESCE(SUM(attribution."allocatedSpend"), 0) AS "allocatedSpend",
    COUNT(DISTINCT attribution."orderId") FILTER (WHERE attribution."isNewCustomer")::int AS "newCustomerCount",
    ROUND(
      SUM(attribution."attributedRevenue") / NULLIF(SUM(attribution."allocatedSpend"), 0),
      4
    ) AS roas
  FROM "ecommerce_fixture"."MarketingAttribution" AS attribution
  CROSS JOIN toolbox_window
  WHERE attribution."touchpointAt" >= toolbox_window.window_from
    AND attribution."touchpointAt" < toolbox_window.window_to
  GROUP BY attribution.channel
  ORDER BY "attributedRevenue" DESC, channel ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 营销触点时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 营销触点时间窗结束时间（不包含），例如 2026-06-30T00:00:00Z。
---
kind: tool
name: summarize_coupon_performance
type: postgres-sql
source: agent-template-postgres
description: |
  按优惠券编码汇总明确 UTC 触点时间窗内的使用订单、归因收入、分摊费用、新客和平均归因订单金额。
  couponCode 仅表示营销归因记录中的合成优惠标识，不包含优惠券面值或完整促销成本。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    attribution."couponCode",
    COUNT(DISTINCT attribution."orderId")::int AS "attributedOrderCount",
    COALESCE(SUM(attribution."attributedRevenue"), 0) AS "attributedRevenue",
    COALESCE(SUM(attribution."allocatedSpend"), 0) AS "allocatedSpend",
    COUNT(DISTINCT attribution."orderId") FILTER (WHERE attribution."isNewCustomer")::int AS "newCustomerCount",
    ROUND(AVG(attribution."attributedRevenue"), 2) AS "averageAttributedRevenue"
  FROM "ecommerce_fixture"."MarketingAttribution" AS attribution
  CROSS JOIN toolbox_window
  WHERE attribution."touchpointAt" >= toolbox_window.window_from
    AND attribution."touchpointAt" < toolbox_window.window_to
    AND attribution."couponCode" IS NOT NULL
  GROUP BY attribution."couponCode"
  ORDER BY "attributedRevenue" DESC, attribution."couponCode" ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 优惠归因时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 优惠归因时间窗结束时间（不包含），例如 2026-06-30T00:00:00Z。
---
kind: tool
name: list_underperforming_campaigns
type: postgres-sql
source: agent-template-postgres
description: |
  分页返回与明确 UTC 时间窗重叠、窗口内有归因费用且归因收入低于归因费用的活动。
  低效判断只比较同一窗口内 attributedRevenue 与 allocatedSpend；活动 spend/budget 仅作为档案返回，不参与部分窗口 ROAS 判定。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  ),
  attribution AS (
    SELECT
      "campaignId",
      COUNT(DISTINCT "orderId")::int AS "attributedOrderCount",
      COALESCE(SUM("attributedRevenue"), 0) AS "attributedRevenue",
      COALESCE(SUM("allocatedSpend"), 0) AS "allocatedSpend"
    FROM "ecommerce_fixture"."MarketingAttribution"
    CROSS JOIN toolbox_window
    WHERE "touchpointAt" >= toolbox_window.window_from
      AND "touchpointAt" < toolbox_window.window_to
    GROUP BY "campaignId"
  ),
  exceptions AS (
    SELECT
      campaign.id,
      campaign."campaignCode",
      campaign.name AS "campaignName",
      campaign.channel::text AS channel,
      campaign.objective::text AS objective,
      campaign."startAt",
      campaign."endAt",
      campaign.budget,
      campaign.spend,
      COALESCE(attribution."attributedOrderCount", 0) AS "attributedOrderCount",
      COALESCE(attribution."attributedRevenue", 0) AS "attributedRevenue",
      COALESCE(attribution."allocatedSpend", 0) AS "allocatedSpend",
      ROUND(
        COALESCE(attribution."attributedRevenue", 0) / NULLIF(attribution."allocatedSpend", 0),
        4
      ) AS roas
    FROM "ecommerce_fixture"."MarketingCampaign" AS campaign
    CROSS JOIN toolbox_window
    LEFT JOIN attribution ON attribution."campaignId" = campaign.id
    WHERE campaign."startAt" < toolbox_window.window_to
      AND campaign."endAt" >= toolbox_window.window_from
      AND COALESCE(attribution."allocatedSpend", 0) > 0
      AND COALESCE(attribution."attributedRevenue", 0) < attribution."allocatedSpend"
  )
  SELECT
    exceptions."campaignCode",
    exceptions."campaignName",
    exceptions.channel,
    exceptions.objective,
    exceptions."startAt",
    exceptions."endAt",
    exceptions.budget,
    exceptions.spend,
    exceptions."attributedOrderCount",
    exceptions."attributedRevenue",
    exceptions."allocatedSpend",
    exceptions.roas,
    COUNT(*) OVER()::int AS "totalCount"
  FROM exceptions
  ORDER BY exceptions.roas ASC NULLS FIRST, exceptions.spend DESC, exceptions.id DESC
  LIMIT $3
  OFFSET $4;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 活动评估时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 活动评估时间窗结束时间（不包含），例如 2026-06-30T00:00:00Z。
  - name: limit
    type: integer
    description: 最多返回的低效活动数量。
    default: 50
    minValue: 1
    maxValue: 100
  - name: offset
    type: integer
    description: 从稳定排序结果中跳过的低效活动数量；首页传 0。
    default: 0
    minValue: 0
    maxValue: 10000
---
kind: tool
name: summarize_customer_acquisition
type: postgres-sql
source: agent-template-postgres
description: |
  按归因渠道汇总明确 UTC 触点时间窗内的新客数、新客归因收入、分摊费用和获客成本。
  customerAcquisitionCost = 新客触点 allocatedSpend / 去重新客订单数；没有实验数据时不得解释为增量获客效果。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    attribution.channel::text AS channel,
    COUNT(DISTINCT attribution."orderId")::int AS "newCustomerCount",
    COALESCE(SUM(attribution."attributedRevenue"), 0) AS "attributedRevenue",
    COALESCE(SUM(attribution."allocatedSpend"), 0) AS "allocatedSpend",
    ROUND(
      SUM(attribution."allocatedSpend") / NULLIF(COUNT(DISTINCT attribution."orderId"), 0),
      2
    ) AS "customerAcquisitionCost",
    ROUND(
      SUM(attribution."attributedRevenue") / NULLIF(COUNT(DISTINCT attribution."orderId"), 0),
      2
    ) AS "revenuePerNewCustomer"
  FROM "ecommerce_fixture"."MarketingAttribution" AS attribution
  CROSS JOIN toolbox_window
  WHERE attribution."touchpointAt" >= toolbox_window.window_from
    AND attribution."touchpointAt" < toolbox_window.window_to
    AND attribution."isNewCustomer"
  GROUP BY attribution.channel
  ORDER BY "newCustomerCount" DESC, channel ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 新客归因时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 新客归因时间窗结束时间（不包含），例如 2026-06-30T00:00:00Z。
