kind: tool
name: list_invoice_exceptions
type: postgres-sql
source: agent-template-postgres
description: |
  分页返回明确 UTC 开票时间窗内存在状态异常、金额差异或截至 to 已逾期的合成发票。
  mismatchAmount 是带方向的原始差额，invoiceMismatchAmount 是其绝对值；结果按绝对差额、开票时间和发票 ID 稳定排序。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    invoice."invoiceNumber",
    orders."orderNumber",
    invoice.status::text AS status,
    invoice.amount,
    invoice."mismatchAmount",
    ABS(invoice."mismatchAmount") AS "invoiceMismatchAmount",
    invoice."issuedAt",
    invoice."dueAt",
    COUNT(*) OVER()::int AS "totalCount"
  FROM "ecommerce_fixture"."FinanceInvoice" AS invoice
  JOIN "ecommerce_fixture"."EcommerceOrder" AS orders ON orders.id = invoice."orderId"
  CROSS JOIN toolbox_window
  WHERE invoice."issuedAt" >= toolbox_window.window_from
    AND invoice."issuedAt" < toolbox_window.window_to
    AND (
      invoice.status::text = 'MISMATCH'
      OR invoice."mismatchAmount" <> 0
      OR (invoice."dueAt" < toolbox_window.window_to AND invoice.status::text = 'ISSUED')
    )
  ORDER BY ABS(invoice."mismatchAmount") DESC, invoice."issuedAt" DESC, invoice.id DESC
  LIMIT $3
  OFFSET $4;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 开票时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 开票时间窗结束时间（不包含），例如 2026-06-30T00:00:00Z。
  - name: limit
    type: integer
    description: 最多返回的异常发票数量。
    default: 50
    minValue: 1
    maxValue: 100
  - name: offset
    type: integer
    description: 从稳定排序结果中跳过的异常发票数量；首页传 0。
    default: 0
    minValue: 0
    maxValue: 10000
