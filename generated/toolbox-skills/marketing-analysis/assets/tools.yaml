kind: tool
name: summarize_supplier_performance
type: postgres-sql
source: agent-template-postgres
description: |
  按供应商汇总明确 UTC 采购下单时间窗内的采购额、延期单、实际准时率，并返回供应商档案评级和目标准时率。
  已取消采购单不进入汇总；actualOnTimeRate 以 receivedAt <= expectedAt 的已收货采购单为分母，未收货单不计入该比例。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    supplier."supplierCode",
    supplier.name AS "supplierName",
    supplier.category,
    supplier.region,
    supplier.rating,
    supplier."leadTimeDays",
    supplier."onTimeRate" AS "profileOnTimeRate",
    COUNT(*)::int AS "purchaseOrderCount",
    COALESCE(SUM(purchase.amount), 0) AS "procurementAmount",
    COUNT(*) FILTER (WHERE purchase."delayedDays" > 0)::int AS "delayedOrderCount",
    ROUND(
      100.0 * COUNT(*) FILTER (
        WHERE purchase."receivedAt" IS NOT NULL
          AND purchase."receivedAt" <= purchase."expectedAt"
      ) / NULLIF(COUNT(*) FILTER (WHERE purchase."receivedAt" IS NOT NULL), 0),
      2
    ) AS "actualOnTimeRate"
  FROM "ecommerce_fixture"."ProcurementSupplier" AS supplier
  JOIN "ecommerce_fixture"."ProcurementOrder" AS purchase ON purchase."supplierId" = supplier.id
  CROSS JOIN toolbox_window
  WHERE purchase."orderedAt" >= toolbox_window.window_from
    AND purchase."orderedAt" < toolbox_window.window_to
    AND purchase.status <> 'CANCELLED'
  GROUP BY supplier.id, supplier."supplierCode", supplier.name, supplier.category, supplier.region, supplier.rating, supplier."leadTimeDays", supplier."onTimeRate"
  ORDER BY "actualOnTimeRate" DESC NULLS LAST, "procurementAmount" DESC, supplier."supplierCode" ASC;
parameters:
  - name: from
    type: string
