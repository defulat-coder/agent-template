kind: tool
name: list-agent-runs
type: postgres-sql
source: agent-template-postgres
description: |
  从持久化 Agent run record 返回最近 30 天的运行摘要。
  status、runtime、model、终态输出和事件数均来自平台 source of truth。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH recent_runs AS MATERIALIZED (
    SELECT
      id,
      status,
      "executionAttempt",
      "heartbeatAt",
      "leaseExpiresAt",
      runtime,
      model,
      "requestedAt",
      "startedAt",
      "completedAt",
      output,
      reason
    FROM public."AgentRun"
    WHERE "requestedAt" >= NOW() - INTERVAL '30 days'
    ORDER BY "requestedAt" DESC, id DESC
    LIMIT $1
  )
  SELECT
    runs.id AS "runId",
    runs.status,
    runs."executionAttempt",
    runs."heartbeatAt",
    runs."leaseExpiresAt",
    runs.runtime,
    runs.model,
    runs."requestedAt",
    runs."startedAt",
    runs."completedAt",
    runs.output,
    runs.reason,
    COALESCE(events."eventCount", 0)::int AS "eventCount"
  FROM recent_runs AS runs
  LEFT JOIN LATERAL (
    SELECT COUNT(*)::int AS "eventCount"
    FROM public."AgentRunEvent" AS event
    WHERE event."runId" = runs.id
  ) AS events ON true
  ORDER BY runs."requestedAt" DESC, runs.id DESC;
parameters:
  - name: limit
    type: integer
    description: 最多返回的 Agent run 数量。
    default: 20
    minValue: 1
    maxValue: 100
