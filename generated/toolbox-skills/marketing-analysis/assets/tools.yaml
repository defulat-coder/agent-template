kind: tool
name: summarize_refunds_by_reason
type: postgres-sql
source: agent-template-postgres
description: |
  按退款原因汇总明确 UTC 申请时间窗内的退款笔数、完成金额和平均处理时长。
  refundAmount 只统计 status = COMPLETED 的 FinanceRefund；processingHours 来自合成退款流程记录。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
