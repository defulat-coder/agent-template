kind: tool
name: reconcile_channel_settlements
type: postgres-sql
source: agent-template-postgres
description: |
  按渠道和结算状态对账明确 UTC 结算周期开始时间窗内的毛额、退款、手续费、预期结算、实际结算和差异。
  settlementRefundAmount 和 differenceAmount 均来自 FinanceSettlement，不等同于 FinanceRefund 退款流水或发票差异。
  PENDING 记录尚无实际结算，settledAmount 和 differenceAmount 返回 null。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    settlement.channel::text AS channel,
    settlement.status::text AS status,
    COUNT(*)::int AS "settlementCount",
    COALESCE(SUM(settlement."grossAmount"), 0) AS "grossAmount",
    COALESCE(SUM(settlement."refundAmount"), 0) AS "settlementRefundAmount",
    COALESCE(SUM(settlement."feeAmount"), 0) AS "feeAmount",
    COALESCE(SUM(settlement."expectedAmount"), 0) AS "expectedAmount",
    SUM(settlement."settledAmount") AS "settledAmount",
    SUM(settlement."differenceAmount") AS "differenceAmount"
  FROM "ecommerce_fixture"."FinanceSettlement" AS settlement
  CROSS JOIN toolbox_window
  WHERE settlement."periodStart" >= toolbox_window.window_from
    AND settlement."periodStart" < toolbox_window.window_to
  GROUP BY settlement.channel, settlement.status
  ORDER BY ABS(SUM(settlement."differenceAmount")) DESC NULLS LAST, channel ASC, status ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 结算周期开始时间窗的起点（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 结算周期开始时间窗的终点（不包含），例如 2026-06-30T00:00:00Z。
---
kind: tool
name: summarize_carrier_performance
type: postgres-sql
source: agent-template-postgres
description: |
  按承运商汇总明确 UTC 发货时间窗内的运单量、签收量、准时率、异常量和平均配送时长。
  准时签收定义为 deliveredAt <= promisedAt；未签收运单不计入平均配送时长。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    shipment.carrier::text AS carrier,
    COUNT(*)::int AS "shipmentCount",
    COUNT(*) FILTER (WHERE shipment."deliveredAt" IS NOT NULL)::int AS "deliveredCount",
    COUNT(*) FILTER (
      WHERE shipment."deliveredAt" IS NOT NULL
        AND shipment."deliveredAt" <= shipment."promisedAt"
    )::int AS "onTimeCount",
    COUNT(*) FILTER (
      WHERE shipment.status::text IN ('DELAYED', 'LOST', 'RETURNED')
        OR shipment."deliveredAt" > shipment."promisedAt"
    )::int AS "exceptionCount",
    ROUND(
      100.0 * COUNT(*) FILTER (
        WHERE shipment."deliveredAt" IS NOT NULL
          AND shipment."deliveredAt" <= shipment."promisedAt"
      ) / NULLIF(COUNT(*) FILTER (WHERE shipment."deliveredAt" IS NOT NULL), 0),
      2
    ) AS "onTimeDeliveryRate",
    ROUND(
      AVG(EXTRACT(EPOCH FROM (shipment."deliveredAt" - shipment."shippedAt")) / 3600)
        FILTER (WHERE shipment."deliveredAt" IS NOT NULL),
      2
    ) AS "averageDeliveryHours"
  FROM "ecommerce_fixture"."LogisticsShipment" AS shipment
  CROSS JOIN toolbox_window
  WHERE shipment."shippedAt" >= toolbox_window.window_from
    AND shipment."shippedAt" < toolbox_window.window_to
  GROUP BY shipment.carrier
  ORDER BY "onTimeDeliveryRate" DESC NULLS LAST, carrier ASC;
parameters:
  - name: from
    type: string
    description: ISO-8601 UTC 发货时间窗开始时间（包含），例如 2026-06-01T00:00:00Z。
  - name: to
    type: string
    description: ISO-8601 UTC 发货时间窗结束时间（不包含），例如 2026-06-30T00:00:00Z。
---
kind: tool
name: list_logistics_exceptions
type: postgres-sql
source: agent-template-postgres
description: |
  分页返回明确 UTC 发货时间窗内状态异常、签收超时或截至 to 已超过承诺时间仍未签收的运单。
  结果包含合成订单、仓库、承运商和异常等待小时数，按超时程度和运单 ID 稳定排序。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    shipment."shipmentNumber",
    orders."orderNumber",
    warehouse."warehouseCode",
    shipment.carrier::text AS carrier,
    shipment.status::text AS status,
    shipment."shippedAt",
    shipment."promisedAt",
    shipment."deliveredAt",
    ROUND(
      EXTRACT(EPOCH FROM (
        COALESCE(shipment."deliveredAt", toolbox_window.window_to) - shipment."promisedAt"
      )) / 3600,
      2
    ) AS "hoursPastPromise",
    COUNT(*) OVER()::int AS "totalCount"
  FROM "ecommerce_fixture"."LogisticsShipment" AS shipment
  JOIN "ecommerce_fixture"."EcommerceOrder" AS orders ON orders.id = shipment."orderId"
  JOIN "ecommerce_fixture"."InventoryWarehouse" AS warehouse ON warehouse.id = shipment."warehouseId"
  CROSS JOIN toolbox_window
  WHERE shipment."shippedAt" >= toolbox_window.window_from
    AND shipment."shippedAt" < toolbox_window.window_to
    AND (
      shipment.status::text IN ('DELAYED', 'LOST', 'RETURNED')
      OR shipment."deliveredAt" > shipment."promisedAt"
      OR (shipment."deliveredAt" IS NULL AND shipment."promisedAt" < toolbox_window.window_to)
    )
  ORDER BY "hoursPastPromise" DESC, shipment."shippedAt" DESC, shipment.id DESC
  LIMIT $3
  OFFSET $4;
