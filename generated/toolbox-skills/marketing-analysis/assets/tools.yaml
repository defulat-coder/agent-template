  averageDailyCapacityUtilization 使用时间窗内 onHand 总和 /（capacityUnits * 快照自然日数）；同一仓库多日快照分别计入。
annotations:
  readOnlyHint: true
  destructiveHint: false
  idempotentHint: true
  openWorldHint: false
statement: |
  WITH toolbox_window AS MATERIALIZED (
    SELECT * FROM public.validate_toolbox_time_window($1::timestamptz, $2::timestamptz)
  )
  SELECT
    warehouse."warehouseCode",
    warehouse.name AS "warehouseName",
    warehouse.region,
    warehouse.city,
    COUNT(DISTINCT snapshot."productId")::int AS "skuCount",
    COALESCE(SUM(snapshot."onHand"), 0)::int AS "onHandUnits",
    COALESCE(SUM(snapshot."onHand" - snapshot.reserved), 0)::int AS "availableUnits",
    COALESCE(SUM(snapshot."inTransit"), 0)::int AS "inTransitUnits",
    COUNT(*) FILTER (
      WHERE snapshot."onHand" - snapshot.reserved <= snapshot."safetyStock"
    )::int AS "riskSnapshotCount",
    COALESCE(SUM(snapshot."onHand" * snapshot."unitCost"), 0) AS "inventoryValue",
    ROUND(
      100.0 * SUM(snapshot."onHand")
        / NULLIF(
          warehouse."capacityUnits"
            * COUNT(DISTINCT (snapshot."snapshotDate" AT TIME ZONE 'UTC')::date),
          0
        ),
      2
    ) AS "averageDailyCapacityUtilization"
  FROM "ecommerce_fixture"."InventoryWarehouse" AS warehouse
  JOIN "ecommerce_fixture"."InventorySnapshot" AS snapshot ON snapshot."warehouseId" = warehouse.id
  CROSS JOIN toolbox_window
  WHERE snapshot."snapshotDate" >= toolbox_window.window_from
    AND snapshot."snapshotDate" < toolbox_window.window_to
  GROUP BY warehouse.id, warehouse."warehouseCode", warehouse.name, warehouse.region, warehouse.city, warehouse."capacityUnits"
  ORDER BY "inventoryValue" DESC, warehouse."warehouseCode" ASC;
